# Compila el APK en GitHub (Ubuntu). Sube el .apk como artefacto descargable.
# Uso: pestaña Actions -> "Android APK" -> Run workflow (o push a main).

name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Liberar espacio en disco
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencias del sistema (Buildozer / Android NDK)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yq \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev \
            liblzma-dev python3-dev

      - name: Instalar Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<81" wheel cython buildozer

      # No cachear ~/.buildozer: el SDK ahi a veces queda incompleto (aidl / build-tools).
      - name: Cache .buildozer (solo carpeta del proyecto)
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec', 'main.py') }}-v4
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Compilar APK (debug)
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
        run: buildozer android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: inventario-debug-apk
          path: bin/*.apk
          if-no-files-found: error
