# Compila el APK en GitHub (Ubuntu). Sube el .apk como artefacto descargable.
# Uso: pestaña Actions -> "Android APK" -> Run workflow (o push a main).

name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Liberar espacio en disco
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencias del sistema (Buildozer / Android NDK)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yq \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev \
            liblzma-dev python3-dev

      - name: Instalar Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<81" wheel cython buildozer

      - name: Instalar Android SDK completo
        run: |
          SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_ROOT/cmdline-tools"

          # Descargar cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d /tmp/cmdline-tools-tmp
          mv /tmp/cmdline-tools-tmp/cmdline-tools "$SDK_ROOT/cmdline-tools/latest"

          export ANDROID_SDK_ROOT="$SDK_ROOT"
          export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$PATH"

          # Aceptar licencias
          yes | sdkmanager --sdk_root="$SDK_ROOT" --licenses > /dev/null 2>&1 || true

          # Instalar herramientas necesarias
          sdkmanager --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-33"

          # Crear el symlink tools/bin/sdkmanager que Buildozer busca
          mkdir -p "$SDK_ROOT/tools/bin"
          ln -sf "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "$SDK_ROOT/tools/bin/sdkmanager"
          ln -sf "$SDK_ROOT/cmdline-tools/latest/bin/avdmanager"  "$SDK_ROOT/tools/bin/avdmanager"

          # Verificar aidl
          echo "--- aidl encontrado en: ---"
          find "$SDK_ROOT/build-tools" -name "aidl"

          # Exportar variables para los pasos siguientes
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          echo "$SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$SDK_ROOT/build-tools/34.0.0"       >> $GITHUB_PATH
          echo "$SDK_ROOT/platform-tools"            >> $GITHUB_PATH

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec', 'main.py') }}-v6
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Compilar APK (debug)
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: buildozer android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: inventario-debug-apk
          path: bin/*.apk
          if-no-files-found: error
